<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#060e1f"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>

    <!-- Cyan glow gradient -->
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffe7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ffe7" stop-opacity="0"/>
    </radialGradient>

    <!-- Cyan linear for text -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffe7"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff9a5c"/>
    </linearGradient>

    <!-- Glow filter for initials -->
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for border -->
    <filter id="borderGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="185"/>
    </clipPath>
  </defs>

  <!-- Dark background circle -->
  <circle cx="200" cy="200" r="200" fill="#030712"/>
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <circle cx="200" cy="180" r="160" fill="url(#glowCyan)"/>

  <!-- Outer ring — cyan thin -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#00ffe7" stroke-width="1" stroke-opacity="0.25" filter="url(#borderGlow)"/>

  <!-- Middle ring — dashed accent -->
  <circle cx="200" cy="200" r="172" fill="none" stroke="#ff6b35" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="6 10"/>

  <!-- Inner ring -->
  <circle cx="200" cy="200" r="158" fill="none" stroke="#00ffe7" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Geometric corner accents (top-left, top-right, bottom-left, bottom-right) -->
  <!-- Top left -->
  <path d="M 85 115 L 85 85 L 115 85" fill="none" stroke="#00ffe7" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- Top right -->
  <path d="M 285 85 L 315 85 L 315 115" fill="none" stroke="#00ffe7" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- Bottom left -->
  <path d="M 85 285 L 85 315 L 115 315" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- Bottom right -->
  <path d="M 315 285 L 315 315 L 285 315" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Horizontal scan line decoration -->
  <line x1="60" y1="200" x2="105" y2="200" stroke="#00ffe7" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="295" y1="200" x2="340" y2="200" stroke="#00ffe7" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="100" cy="200" r="2.5" fill="#00ffe7" fill-opacity="0.5"/>
  <circle cx="300" cy="200" r="2.5" fill="#00ffe7" fill-opacity="0.5"/>

  <!-- Small dot grid top -->
  <circle cx="178" cy="108" r="1.5" fill="#00ffe7" fill-opacity="0.3"/>
  <circle cx="190" cy="108" r="1.5" fill="#00ffe7" fill-opacity="0.3"/>
  <circle cx="202" cy="108" r="1.5" fill="#ff6b35" fill-opacity="0.5"/>
  <circle cx="214" cy="108" r="1.5" fill="#00ffe7" fill-opacity="0.3"/>
  <circle cx="226" cy="108" r="1.5" fill="#00ffe7" fill-opacity="0.3"/>

  <!-- ══ INITIALS "AS" — main centerpiece ══ -->
  <!-- Letter A -->
  <g filter="url(#glowFilter)">
    <!-- A left leg -->
    <polygon points="118,262 148,138 160,138 136,262" fill="url(#cyanGrad)"/>
    <!-- A right leg -->
    <polygon points="178,138 190,138 164,262 152,262" fill="url(#cyanGrad)"/>
    <!-- A crossbar -->
    <rect x="124" y="208" width="58" height="14" rx="2" fill="url(#cyanGrad)"/>
    <!-- A cap dot (orange accent) -->
    <rect x="146" y="130" width="12" height="6" rx="3" fill="url(#accentGrad)"/>
  </g>

  <!-- Letter S -->
  <g filter="url(#glowFilter)">
    <!-- S top arc -->
    <path d="M 282 162 Q 282 138 258 138 L 220 138 Q 210 138 210 150 L 210 193 Q 210 205 222 205 L 270 205 Q 278 205 278 215 L 278 250 Q 278 262 266 262 L 222 262 Q 210 262 210 250 L 210 240" fill="none" stroke="url(#cyanGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- S accent bar -->
    <rect x="209" y="197" width="70" height="12" rx="6" fill="url(#accentGrad)" fill-opacity="0.9"/>
  </g>

  <!-- Dot separator between A and S -->
  <circle cx="200" cy="200" r="3.5" fill="#ff6b35" fill-opacity="0"/>

  <!-- ══ FULL NAME below ══ -->
  <!-- ANAS -->
  <text x="200" y="298"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="22"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="8"
    opacity="0.95">ANAS</text>

  <!-- SABIQ -->
  <text x="200" y="322"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="22"
    font-weight="800"
    fill="url(#cyanGrad)"
    text-anchor="middle"
    letter-spacing="7"
    opacity="1">SABIQ</text>

  <!-- Tagline -->
  <text x="200" y="346"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="8.5"
    font-weight="400"
    fill="#64748b"
    text-anchor="middle"
    letter-spacing="3">DEV · AI · GAMES</text>

  <!-- Bottom accent line under tagline -->
  <line x1="155" y1="353" x2="247" y2="353" stroke="url(#cyanGrad)" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Small orange dot accents -->
  <circle cx="149" cy="353" r="2" fill="#ff6b35" fill-opacity="0.7"/>
  <circle cx="253" cy="353" r="2" fill="#ff6b35" fill-opacity="0.7"/>

</svg>
